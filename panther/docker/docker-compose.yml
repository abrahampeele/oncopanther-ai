version: '3.8'

services:
  oncopanther:
    image: abpeele/oncopanther-ai:latest
    container_name: oncopanther-ai
    ports:
      - "8501:8501"
      - "8000:8000"
    volumes:
      - ${REFS_DIR:-./refs}:/refs
      - ${DATA_DIR:-./data}:/data
    environment:
      - JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
      - NXF_HOME=/app/.nextflow
      - PYTHONPATH=/app/panther
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 32G
        reservations:
          memory: 8G
